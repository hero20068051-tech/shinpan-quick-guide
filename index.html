<head>
<meta charset="UTF-8">

<title>Shinpan Quick Guide</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f1f5f9;color:#0f172a;line-height:1.6}
header{background:linear-gradient(135deg,#0f766e,#14b8a6);color:#fff;padding:28px 20px;border-bottom-left-radius:28px;border-bottom-right-radius:28px}
h1{margin:0 0 8px;font-size:30px;line-height:1.25}
header p{margin:0;font-size:14px}
main{max-width:900px;margin:auto;padding:18px 14px 70px}
section{background:#fff;border-radius:18px;padding:16px;margin-bottom:16px;box-shadow:0 6px 18px rgba(15,23,42,.06)}
h2{margin:0 0 12px;font-size:20px}
.notice{background:#ecfeff;color:#134e4a;border:1px solid #99f6e4;border-radius:14px;padding:12px;margin-top:14px;font-size:14px}
input,select,textarea,button{font:inherit}
input,select,textarea{width:100%;border:1px solid #e2e8f0;border-radius:12px;padding:11px;background:#fff}
textarea{min-height:80px}
button{border:0;border-radius:999px;padding:10px 14px;background:#0f766e;color:#fff;font-weight:700}
button.sub{background:#e2e8f0;color:#0f172a}
button.warn{background:#f59e0b;color:#111827}
.search{display:flex;gap:8px;margin-bottom:12px}
.tabs{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px}
.tab{white-space:nowrap;background:#fff;color:#0f172a;border:1px solid #e2e8f0}
.tab.active{background:#0f766e;color:#fff;border-color:#0f766e}
.grid{display:grid;grid-template-columns:1fr;gap:12px}
.card{border:1px solid #e2e8f0;border-radius:16px;padding:14px;background:#fff}
.card h3{margin:0;font-size:18px}
.top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}
.badge{display:inline-block;background:#ccfbf1;color:#115e59;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:700}
.summary{color:#64748b;font-size:14px;margin:6px 0 10px}
.detail{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px;margin-top:8px}
.label{display:block;color:#64748b;font-size:12px;font-weight:800;margin-bottom:3px}
.form{display:grid;gap:10px}
.guide{white-space:pre-line;background:#f8fafc;border:1px dashed #94a3b8;border-radius:14px;padding:12px;margin-top:12px}
.check{display:flex;gap:10px;align-items:center;background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px;margin-bottom:8px}
.check input{width:auto;transform:scale(1.2)}
.empty{text-align:center;color:#64748b;padding:20px;border:1px dashed #cbd5e1;border-radius:14px}
.short .summary,.short .extra{display:none}
footer{text-align:center;color:#64748b;font-size:12px;padding:20px}
@media(min-width:700px){.grid{grid-template-columns:1fr 1fr}.form{grid-template-columns:1fr 1fr}.full{grid-column:1/-1}}
</style>
</head>
<body>
<header>
<h1>Shinpan Quick Guide</h1>
<p>審判・コーチ・保護者審判のためのサッカールール確認アプリ</p>
<div class="notice">
ルールの優先順位：<b>大会要項 ＞ 年代別ルール ＞ 基本競技規則</b><br>
最終判断は競技規則・大会要項・審判団の確認を優先してください。
</div>
</header>

<main>
<section>
<h2>ルール検索</h2>
<div class="search">
<input id="q" placeholder="例：ハンド、オフサイド、PK、DOGSO">
<button class="sub" onclick="clearSearch()">クリア</button>
</div>
<div id="tabs" class="tabs"></div>
<button id="shortBtn" class="warn" onclick="toggleShort()">短文表示モード OFF</button>
<button class="sub" onclick="showAll()">すべて表示</button>
</section>

<section>
<h2>ルールカード</h2>
<div id="cards" class="grid"></div>
</section>

<section>
<h2>大会要項入力</h2>
<p style="color:#64748b;margin-top:-4px">大会ごとの違いを入力すると、専用クイックガイドを作成できます。</p>
<div class="form">
<label>大会名<input id="tournamentName" placeholder="例：〇〇カップ U-12"></label>
<label>年代
<select id="age">
<option>一般</option><option>高校生</option><option>中学生</option><option>小学生</option><option>プロ</option>
</select>
</label>
<label>試合形式
<select id="format">
<option>11人制</option><option>8人制</option>
</select>
</label>
<label>審判人数
<select id="refs">
<option>4審制</option><option>3審制</option><option>2審制</option><option>1審制</option>
</select>
</label>
<label>試合時間<input id="time" placeholder="例：20分-5分-20分"></label>
<label>交代ルール<input id="subs" placeholder="例：自由交代・再交代可"></label>
<label>飲水・暑熱対応<input id="water" placeholder="例：飲水あり"></label>
<label>延長・PK方式<input id="pk" placeholder="例：延長なし・PK3人制"></label>
<label class="full">大会メモ<textarea id="memo" placeholder="例：雷鳴時は即中断。本部判断を優先。"></textarea></label>
</div>
<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
<button onclick="makeGuide()">大会ガイドを作成</button>
<button class="sub" onclick="saveTournament()">保存</button>
<button class="sub" onclick="resetTournament()">リセット</button>
</div>
<div id="guide" class="guide">大会要項を入力して「大会ガイドを作成」を押してください。</div>
</section>

<section>
<h2>試合前チェックリスト</h2>
<div id="checks"></div>
<button class="sub" onclick="resetChecks()">チェックをリセット</button>
</section>
</main>

<footer>Shinpan Quick Guide｜競技規則の全文転載ではなく、現場確認用の要約表示です。</footer>

let current="すべて";
let isShort=false;

function esc(s){
return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}

function categories(){
return ["すべて"].concat([...new Set(rules.map(r=>r.category))]);
}

function renderTabs(){
const box=document.getElementById("tabs");
box.innerHTML="";
categories().forEach(c=>{
const b=document.createElement("button");
b.className="tab"+(c===current?" active":"");
b.textContent=c;
b.onclick=()=>{current=c;renderTabs();renderCards();};
box.appendChild(b);
});
}

function matchRule(r,q){
  q = (q || "").trim().toLowerCase();
  if(!q) return true;

  const norm = v => String(v || "").toLowerCase();

  const categoryExactExists = rules.some(x => norm(x.category) === q);
  if(categoryExactExists){
    return norm(r.category) === q;
  }

  const isShortAlphaNum = /^[a-z0-9]+$/i.test(q) && q.length <= 3;
  const titleHitExists = rules.some(x => norm(x.title).includes(q));

  if(titleHitExists && !isShortAlphaNum){
    return norm(r.title).includes(q);
  }

  const text = [
    r.title,
    r.category,
    r.decision,
    r.restart,
    r.discipline,
    r.note,
    r.law
  ].map(norm).join(" ");

  return text.includes(q);
}


  
function renderCards(){
const q=document.getElementById("q").value.trim();
const list=rules.filter(r=>(current==="すべて"||r.category===current)&&(!q||matchRule(r,q)));
const box=document.getElementById("cards");
box.innerHTML="";
if(!list.length){box.innerHTML='<div class="empty">該当するルールがありません。</div>';return;}
list.forEach(r=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=
'<div class="top"><h3>'+esc(r.title)+'</h3><span class="badge">'+esc(r.category)+'</span></div>'+
'<p class="summary">'+esc(r.decision)+'</p>'+
'<div class="detail"><span class="label">判定</span>'+esc(r.decision)+'</div>'+
'<div class="detail"><span class="label">再開方法</span>'+esc(r.restart)+'</div>'+
'<div class="detail extra"><span class="label">懲戒</span>'+esc(r.discipline)+'</div>'+
'<div class="detail extra"><span class="label">注意点</span>'+esc(r.note)+'</div>'+
'<div class="detail"><span class="label">参照</span><b>'+esc(r.law)+'</b></div>'+
'<div class="detail extra"><span class="label">大会要項による変更可能性</span>大会要項に独自規定がある場合は、大会要項を優先してください。</div>';
box.appendChild(div);
});
}

function clearSearch(){
document.getElementById("q").value="";
renderCards();
}

function showAll(){
current="すべて";
document.getElementById("q").value="";
renderTabs();
renderCards();
}

function toggleShort(){
isShort=!isShort;
document.body.classList.toggle("short",isShort);
document.getElementById("shortBtn").textContent=isShort?"短文表示モード ON":"短文表示モード OFF";
}

function getVal(id){return document.getElementById(id).value;}

function makeGuide(){
const text=
"【大会専用クイックガイド】\n\n"+
"大会名："+(getVal("tournamentName")||"未入力")+"\n"+
"年代："+getVal("age")+"\n"+
"形式："+getVal("format")+"\n"+
"審判："+getVal("refs")+"\n"+
"試合時間："+(getVal("time")||"未入力")+"\n"+
"交代："+(getVal("subs")||"未入力")+"\n"+
"飲水・暑熱対応："+(getVal("water")||"未入力")+"\n"+
"延長・PK方式："+(getVal("pk")||"未入力")+"\n\n"+
"大会メモ：\n"+(getVal("memo")||"なし")+"\n\n"+
"優先順位：大会要項 ＞ 年代別ルール ＞ 基本競技規則\n"+
"不明点は試合前に本部・審判団で確認してください。";
document.getElementById("guide").textContent=text;
}

function saveTournament(){
const ids=["tournamentName","age","format","refs","time","subs","water","pk","memo"];
const data={};
ids.forEach(id=>data[id]=getVal(id));
localStorage.setItem("shinpanTournament",JSON.stringify(data));
makeGuide();
alert("保存しました。");
}

function loadTournament(){
const s=localStorage.getItem("shinpanTournament");
if(!s)return;
try{
const data=JSON.parse(s);
Object.keys(data).forEach(id=>{
if(document.getElementById(id))document.getElementById(id).value=data[id];
});
makeGuide();
}catch(e){}
}

function resetTournament(){
if(!confirm("大会要項をリセットしますか？"))return;
["tournamentName","time","subs","water","pk","memo"].forEach(id=>document.getElementById(id).value="");
document.getElementById("age").selectedIndex=0;
document.getElementById("format").selectedIndex=0;
document.getElementById("refs").selectedIndex=0;
localStorage.removeItem("shinpanTournament");
document.getElementById("guide").textContent="大会要項を入力して「大会ガイドを作成」を押してください。";
}

function renderChecks(){
const saved=JSON.parse(localStorage.getItem("shinpanChecks")||"{}");
const box=document.getElementById("checks");
box.innerHTML="";
checkItems.forEach((item,i)=>{
const id="c"+i;
const lab=document.createElement("label");
lab.className="check";
lab.innerHTML='<input type="checkbox" '+(saved[id]?"checked":"")+'> <span>'+esc(item)+'</span>';
const cb=lab.querySelector("input");
cb.onchange=()=>{
const now=JSON.parse(localStorage.getItem("shinpanChecks")||"{}");
now[id]=cb.checked;
localStorage.setItem("shinpanChecks",JSON.stringify(now));
};
box.appendChild(lab);
});
}

function resetChecks(){
localStorage.removeItem("shinpanChecks");
renderChecks();
}

document.getElementById("q").addEventListener("input",renderCards);

renderTabs();
renderCards();
renderChecks();
loadTournament();
</script>
