<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shinpan Quick Guide</title>
  <style>
    :root {
      --main: #0f766e;
      --main-dark: #115e59;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: #f59e0b;
      --danger: #dc2626;
      --success: #16a34a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, var(--main), #14b8a6);
      color: white;
      padding: 28px 20px 24px;
      border-bottom-left-radius: 28px;
      border-bottom-right-radius: 28px;
      box-shadow: 0 8px 24px rgba(15, 118, 110, 0.25);
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.25;
    }

    header p {
      margin: 0;
      font-size: 14px;
      opacity: 0.92;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 18px 14px 80px;
    }

    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
    }

    .section h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .notice {
      background: #ecfeff;
      border: 1px solid #99f6e4;
      color: #134e4a;
      border-radius: 14px;
      padding: 12px;
      font-size: 14px;
      margin-top: 12px;
    }

    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input, select, textarea, button {
      font: inherit;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 12px;
      background: white;
      color: var(--text);
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--main);
      box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15);
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--main);
      color: white;
      cursor: pointer;
      font-weight: 700;
    }

    button.secondary {
      background: #e2e8f0;
      color: var(--text);
    }

    button.warning {
      background: var(--accent);
      color: #1f2937;
    }

    button.danger {
      background: var(--danger);
    }

    button.small {
      padding: 7px 10px;
      font-size: 13px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 12px;
    }

    .tab {
      flex: 0 0 auto;
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
    }

    .tab.active {
      background: var(--main);
      color: white;
      border-color: var(--main);
      font-weight: 700;
    }

    .rules-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .rule-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #ffffff;
      padding: 14px;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .rule-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
    }

    .rule-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .rule-title {
      font-size: 17px;
      font-weight: 800;
      margin: 0;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 700;
      background: #ccfbf1;
      color: var(--main-dark);
      white-space: nowrap;
    }

    .rule-summary {
      color: var(--muted);
      font-size: 14px;
      margin: 0;
    }

    .detail-list {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .detail-item {
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px;
    }

    .detail-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 4px;
    }

    .detail-value {
      font-size: 15px;
      margin: 0;
    }

    .law {
      color: var(--main-dark);
      font-weight: 800;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .quick-guide {
      background: #f8fafc;
      border: 1px dashed #94a3b8;
      border-radius: 16px;
      padding: 14px;
      margin-top: 12px;
      white-space: pre-line;
      font-size: 15px;
    }

    .checklist {
      display: grid;
      gap: 9px;
    }

    .check-item {
      display: flex;
      gap: 10px;
      align-items: center;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
    }

    .check-item input {
      width: auto;
      transform: scale(1.2);
    }

    .check-item span {
      flex: 1;
    }

    .short-mode .rule-card {
      padding: 12px;
    }

    .short-mode .rule-summary {
      display: none;
    }

    .short-mode .detail-item.optional {
      display: none;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 20px;
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: #f8fafc;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 20px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.55);
      display: none;
      align-items: flex-end;
      z-index: 50;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      background: white;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      padding: 18px;
      box-shadow: 0 -10px 28px rgba(15, 23, 42, 0.2);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .modal h3 {
      margin: 0;
      font-size: 22px;
    }

    .close-btn {
      background: #e2e8f0;
      color: var(--text);
      min-width: 42px;
    }

    @media (min-width: 720px) {
      header {
        padding: 34px 28px 30px;
      }

      header h1 {
        font-size: 36px;
      }

      main {
        padding: 24px 20px 90px;
      }

      .rules-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .form-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .form-grid .full {
        grid-column: 1 / -1;
      }

      .modal-backdrop {
        align-items: center;
        justify-content: center;
      }

      .modal {
        max-width: 680px;
        border-radius: 24px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Shinpan Quick Guide</h1>
    <p>審判・コーチ・保護者審判のためのサッカールール確認アプリ</p>
    <div class="notice">
      ルールの優先順位：<strong>大会要項 ＞ 年代別ルール ＞ 基本競技規則</strong><br>
      最終判断は競技規則・大会要項・審判団の確認を優先してください。
    </div>
  </header>

  <main id="app">
    <section class="section">
      <h2>ルール検索</h2>
      <div class="search-box">
        <input id="searchInput" type="search" placeholder="例：ハンド、オフサイド、PK、DOGSO" />
        <button id="clearSearch" class="secondary small">クリア</button>
      </div>

      <div class="tabs" id="categoryTabs"></div>

      <div class="toolbar">
        <button id="toggleShort" class="warning small">短文表示モード OFF</button>
        <button id="showAll" class="secondary small">すべて表示</button>
      </div>
    </section>

    <section class="section">
      <h2>ルールカード</h2>
      <div id="rulesContainer" class="rules-grid"></div>
    </section>

    <section class="section">
      <h2>大会要項入力</h2>
      <p style="color: var(--muted); font-size: 14px; margin-top: -4px;">
        大会ごとの違いを入力すると、専用クイックガイドを作成できます。
      </p>

      <div class="form-grid">
        <label>
          大会名
          <input id="tournamentName" placeholder="例：〇〇カップ U-12" />
        </label>

        <label>
          年代
          <select id="ageCategory">
            <option value="一般">一般</option>
            <option value="中学生">中学生</option>
            <option value="高校生">高校生</option>
            <option value="小学生">小学生</option>
            <option value="プロ">プロ</option>
          </select>
        </label>

        <label>
          試合形式
          <select id="matchFormat">
            <option value="11人制">11人制</option>
            <option value="8人制">8人制</option>
          </select>
        </label>

        <label>
          審判人数
          <select id="refereeSystem">
            <option value="4審制">4審制</option>
            <option value="3審制">3審制</option>
            <option value="2審制">2審制</option>
            <option value="1審制">1審制</option>
          </select>
        </label>

        <label>
          試合時間
          <input id="matchTime" placeholder="例：20分-5分-20分" />
        </label>

        <label>
          交代ルール
          <input id="subRule" placeholder="例：自由交代・再交代可" />
        </label>

        <label>
          飲水・暑熱対応
          <input id="waterBreak" placeholder="例：飲水あり / WBGTにより実施" />
        </label>

        <label>
          延長・PK方式
          <input id="pkRule" placeholder="例：延長なし・PK3人制" />
        </label>

        <label class="full">
          大会メモ
          <textarea id="tournamentMemo" placeholder="例：雷鳴時は即中断。本部判断を優先。"></textarea>
        </label>
      </div>

      <div class="toolbar">
        <button id="generateGuide">大会ガイドを作成</button>
        <button id="saveTournament" class="secondary">保存</button>
        <button id="resetTournament" class="danger">リセット</button>
      </div>

      <div id="quickGuide" class="quick-guide">大会要項を入力して「大会ガイドを作成」を押してください。</div>
    </section>

    <section class="section">
      <h2>試合前チェックリスト</h2>
      <div id="checklist" class="checklist"></div>
      <div class="toolbar">
        <button id="resetChecklist" class="secondary small">チェックをリセット</button>
      </div>
    </section>
  </main>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h3 id="modalTitle"></h3>
          <span id="modalCategory" class="badge"></span>
        </div>
        <button id="closeModal" class="close-btn">×</button>
      </div>
      <div id="modalDetails" class="detail-list"></div>
    </div>
  </div>

  <footer>
    Shinpan Quick Guide ｜ 競技規則の全文転載ではなく、現場確認用の要約表示です。
  </footer>

  <script>
    const rules = [
      {
        title: "ハンド",
        category: "ファウル",
        decision: "故意に手や腕でボールを扱った場合は反則。",
        restart: "直接FK、ペナルティエリア内ならPK。",
        discipline: "得点阻止などは警告・退場の対象。",
        note: "腕の位置や動き、不自然な拡大を考慮する。",
        law: "第12条"
      },
      {
        title: "オフサイド",
        category: "オフサイド",
        decision: "味方がボールを蹴った瞬間の位置とプレー関与を確認。",
        restart: "間接FK。",
        discipline: "通常は懲戒なし。",
        note: "ポジションだけでは反則にならない。",
        law: "第11条"
      },
      {
        title: "PK",
        category: "再開方法",
        decision: "守備側が自陣PA内で直接FK対象の反則。",
        restart: "ペナルティキック。",
        discipline: "反則内容に応じて警告・退場。",
        note: "GKは少なくとも片足をゴールライン上に置く。",
        law: "第14条"
      },
      {
        title: "DOGSO",
        category: "懲戒",
        decision: "決定的得点機会を阻止した場合。",
        restart: "反則内容に応じる。",
        discipline: "原則退場。",
        note: "距離、方向、守備者数などを総合判断。",
        law: "第12条"
      },
      {
        title: "SPA",
        category: "懲戒",
        decision: "有望な攻撃を反則で止めた場合。",
        restart: "反則に応じたFK。",
        discipline: "警告。",
        note: "カウンター阻止などが典型例。",
        law: "第12条"
      },
      {
        title: "交代（10秒ルール）",
        category: "交代",
        decision: "交代選手は退出後に入場。",
        restart: "通常どおり。",
        discipline: "遅延行為は警告対象。",
        note: "退出選手は最も近い境界線から10秒以内に退場する。",
        law: "第3条"
      },
      {
        title: "GK8秒ルール",
        category: "GK",
        decision: "GKが8秒以上ボールを保持した場合。",
        restart: "相手チームのCK。",
        discipline: "通常は懲戒なし。",
        note: "審判は残り5秒を手でカウントする。",
        law: "第12条"
      },
      {
        title: "キックオフ",
        category: "再開方法",
        decision: "試合開始・得点後に実施。",
        restart: "キックオフ。",
        discipline: "なし。",
        note: "ボールが動けばインプレー。",
        law: "第8条"
      },
      {
        title: "ドロップボール",
        category: "再開方法",
        decision: "競技規則上、特別な理由で中断した場合。",
        restart: "ドロップボール。",
        discipline: "なし。",
        note: "原則として最後にボールを保持していた側に与える。",
        law: "第8条"
      },
      {
        title: "雷・暑熱対応",
        category: "安全管理",
        decision: "大会要項や本部判断を優先。",
        restart: "再開時は中断時の方法による。",
        discipline: "なし。",
        note: "雷鳴時は即中断、飲水タイム等を適用。",
        law: "大会要項優先"
      }
    ];

    const checklistItems = [
      "試合時間を確認した",
      "審判人数・役割を確認した",
      "交代ルールを確認した",
      "飲水・暑熱対応を確認した",
      "延長・PK方式を確認した",
      "ユニフォーム・用具を確認した",
      "大会要項の独自ルールを確認した",
      "雷・荒天時の対応を確認した"
    ];

    let currentCategory = "すべて";
    let shortMode = false;

    const searchInput = document.getElementById("searchInput");
    const clearSearch = document.getElementById("clearSearch");
    const categoryTabs = document.getElementById("categoryTabs");
    const rulesContainer = document.getElementById("rulesContainer");
    const toggleShort = document.getElementById("toggleShort");
    const showAll = document.getElementById("showAll");

    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalTitle = document.getElementById("modalTitle");
    const modalCategory = document.getElementById("modalCategory");
    const modalDetails = document.getElementById("modalDetails");
    const closeModal = document.getElementById("closeModal");

    const tournamentFields = [
      "tournamentName",
      "ageCategory",
      "matchFormat",
      "refereeSystem",
      "matchTime",
      "subRule",
      "waterBreak",
      "pkRule",
      "tournamentMemo"
    ];

    function getCategories() {
      return ["すべて", ...new Set(rules.map(rule => rule.category))];
    }

    function renderTabs() {
      categoryTabs.innerHTML = "";
      getCategories().forEach(category => {
        const btn = document.createElement("button");
        btn.className = category === currentCategory ? "tab active" : "tab";
        btn.textContent = category;
        btn.addEventListener("click", () => {
          currentCategory = category;
          renderTabs();
          renderRules();
        });
        categoryTabs.appendChild(btn);
      });
    }

    function ruleMatchesSearch(rule, query) {
      const text = [
        rule.title,
        rule.category,
        rule.decision,
        rule.restart,
        rule.discipline,
        rule.note,
        rule.law
      ].join(" ").toLowerCase();

      return text.includes(query.toLowerCase());
    }

    function getFilteredRules() {
      const query = searchInput.value.trim();
      return rules.filter(rule => {
        const categoryOk = currentCategory === "すべて" || rule.category === currentCategory;
        const searchOk = !query || ruleMatchesSearch(rule, query);
        return categoryOk && searchOk;
      });
    }

    function renderRules() {
      const filtered = getFilteredRules();
      rulesContainer.innerHTML = "";

      if (filtered.length === 0) {
        rulesContainer.innerHTML = '<div class="empty">該当するルールがありません。</div>';
        return;
      }

      filtered.forEach((rule, index) => {
        const card = document.createElement("article");
        card.className = "rule-card";
        card.innerHTML = `
          <div class="rule-top">
            <h3 class="rule-title">${escapeHtml(rule.title)}</h3>
            <span class="badge">${escapeHtml(rule.category)}</span>
          </div>
          <p class="rule-summary">${escapeHtml(rule.decision)}</p>
          <div class="detail-list">
            <div class="detail-item">
              <span class="detail-label">再開方法</span>
              <p class="detail-value">${escapeHtml(rule.restart)}</p>
            </div>
            <div class="detail-item optional">
              <span class="detail-label">参照</span>
              <p class="detail-value law">${escapeHtml(rule.law)}</p>
            </div>
          </div>
        `;
        card.addEventListener("click", () => openRuleModal(rule));
        rulesContainer.appendChild(card);
      });
    }

    function openRuleModal(rule) {
      modalTitle.textContent = rule.title;
      modalCategory.textContent = rule.category;

      modalDetails.innerHTML = `
        <div class="detail-item">
          <span class="detail-label">判定</span>
          <p class="detail-value">${escapeHtml(rule.decision)}</p>
        </div>
        <div class="detail-item">
          <span class="detail-label">再開方法</span>
          <p class="detail-value">${escapeHtml(rule.restart)}</p>
        </div>
        <div class="detail-item">
          <span class="detail-label">懲戒</span>
          <p class="detail-value">${escapeHtml(rule.discipline)}</p>
        </div>
        <div class="detail-item">
          <span class="detail-label">審判向け注意点</span>
          <p class="detail-value">${escapeHtml(rule.note)}</p>
        </div>
        <div class="detail-item">
          <span class="detail-label">参照条文</span>
          <p class="detail-value law">${escapeHtml(rule.law)}</p>
        </div>
        <div class="detail-item">
          <span class="detail-label">大会要項による変更可能性</span>
          <p class="detail-value">大会要項に独自規定がある場合は、大会要項を優先してください。</p>
        </div>
      `;

      modalBackdrop.classList.add("show");
    }

    function closeRuleModal() {
      modalBackdrop.classList.remove("show");
    }

    function generateTournamentGuide() {
      const data = getTournamentData();

      const guide = `【大会専用クイックガイド】

大会名：${data.tournamentName || "未入力"}
年代：${data.ageCategory}
形式：${data.matchFormat}
審判：${data.refereeSystem}
試合時間：${data.matchTime || "未入力"}
交代：${data.subRule || "未入力"}
飲水・暑熱対応：${data.waterBreak || "未入力"}
延長・PK方式：${data.pkRule || "未入力"}

大会メモ：
${data.tournamentMemo || "なし"}

優先順位：
大会要項 ＞ 年代別ルール ＞ 基本競技規則

注意：
不明点がある場合は、試合前に本部・審判団で確認してください。`;

      document.getElementById("quickGuide").textContent = guide;
    }

    function getTournamentData() {
      const data = {};
      tournamentFields.forEach(id => {
        data[id] = document.getElementById(id).value;
      });
      return data;
    }

    function saveTournamentData() {
      localStorage.setItem("shinpanTournament", JSON.stringify(getTournamentData()));
      generateTournamentGuide();
      alert("大会要項を保存しました。");
    }

    function loadTournamentData() {
      const saved = localStorage.getItem("shinpanTournament");
      if (!saved) return;

      try {
        const data = JSON.parse(saved);
        tournamentFields.forEach(id => {
          if (data[id] !== undefined) {
            document.getElementById(id).value = data[id];
          }
        });
        generateTournamentGuide();
      } catch (e) {
        console.warn("保存データの読み込みに失敗しました。", e);
      }
    }
